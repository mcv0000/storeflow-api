version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: storeflow-postgres
    environment:
      POSTGRES_USER: storeflow
      POSTGRES_PASSWORD: storeflow_dev_password
      POSTGRES_DB: storeflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: storeflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storeflow-api
    environment:
      - DATABASE_URL=postgres://storeflow:storeflow_dev_password@postgres:5432/storeflow?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=your-secret-key-change-in-production
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
