name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and Format Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: storeflow
          POSTGRES_PASSWORD: storeflow
          POSTGRES_DB: storeflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U storeflow -d storeflow"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 8080
      DATABASE_URL: postgres://storeflow:storeflow@localhost:5432/storeflow?sslmode=disable
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run migrations
        run: |
          for file in migrations/*.up.sql; do
            echo "Running migration: $file"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$file"
          done

      - name: Build API
        run: go build ./cmd/api